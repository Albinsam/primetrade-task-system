<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Backend-System | Task Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
   <style>
    :root { --accent: #2563eb; --bg: #f1f5f9; }
    body { background-color: var(--bg); font-family: 'Inter', system-ui, sans-serif; height: 100vh; overflow-x: hidden; }
    
    
    .auth-wrapper { max-width: 380px; margin: 80px auto; }
    .card-auth { background: white; border-radius: 12px; border: none; box-shadow: 0 10px 25px rgba(0,0,0,0.05); padding: 20px 25px; }
    
    
    .dashboard-wrapper { display: none; padding: 20px 40px; }
    
    
    .flex-container { 
        display: flex; 
        gap: 30px; 
        align-items: flex-start; 
        max-width: 1400px; 
        margin: 0 auto;
    }
    
    
    .left-panel { 
        flex: 1; 
        min-width: 0; 
    } 
    
    
    .right-panel { 
        flex: 1; 
        position: sticky; 
        top: 20px; 
        min-width: 0;
    }

    .card-custom { background: white; border-radius: 12px; border: none; box-shadow: 0 2px 8px rgba(0,0,0,0.05); padding: 25px; }
    
    
    .wide-input { padding: 12px; border-radius: 6px; border: 1px solid #cbd5e1; margin-bottom: 15px; font-size: 0.95rem; width: 100%; }
    .long-textarea { min-height: 420px; resize: none; }
    
    .btn-prime { background-color: var(--accent); color: white; border: none; padding: 14px; font-weight: 600; border-radius: 6px; width: 100%; }
    .btn-prime:hover { background-color: #1d4ed8; }
    
    .nav-link { cursor: pointer; color: #64748b; font-weight: 600; font-size: 0.9rem; }
    .nav-link.active { color: var(--accent); border-bottom: 2px solid var(--accent); }
    
    .password-container { position: relative; }
    .password-toggle { position: absolute; right: 12px; top: 25%; cursor: pointer; color: #94a3b8; }
    
    #message-toast { position: fixed; top: 20px; right: 20px; display: none; z-index: 9999; border-radius: 6px; }

    
    .system-header { background: white; padding: 12px 30px; border-radius: 10px; margin-bottom: 25px; box-shadow: 0 2px 5px rgba(0,0,0,0.03); }
    .user-pill { background: #eff6ff; color: var(--accent); padding: 5px 12px; border-radius: 20px; font-size: 0.85rem; font-weight: 700; border: 1px solid #dbeafe; }
</style>
</head>
<body>

<div id="message-toast" class="alert shadow-lg"></div>

<div id="auth-section" class="auth-wrapper">
    <div class="text-center mb-4">
        <h3 class="fw-bold text-primary mb-0">Backend-System</h3>
        <small class="text-muted fw-bold">Task Management </small>
    </div>
    
    <div class="card-auth">
        <div class="d-flex justify-content-center gap-4 mb-4">
            <span id="tab-login" class="nav-link active" onclick="showAuth('login')">SIGN IN</span>
            <span id="tab-register" class="nav-link" onclick="showAuth('register')">SIGN UP</span>
        </div>

        <div id="form-login">
            <input type="text" id="username" class="form-control mb-3 wide-input" placeholder="Username">
            <div class="password-container">
                <input type="password" id="password" class="form-control wide-input" placeholder="Password">
                <i class="bi bi-eye password-toggle" onclick="togglePassword('password')"></i>
            </div>
            <button class="btn btn-prime mt-2" onclick="handleLogin()">Login</button>
        </div>

        <div id="form-register" style="display: none;">
            <input type="text" id="reg-username" class="form-control mb-3 wide-input" placeholder="Username">
            <div class="password-container">
                <input type="password" id="reg-password" class="form-control wide-input" placeholder="Password">
                <i class="bi bi-eye password-toggle" onclick="togglePassword('reg-password')"></i>
            </div>
            <select id="reg-role" class="form-select mb-3 wide-input">
                <option value="user">User</option>
                <option value="admin">Admin</option>
            </select>
            <button class="btn btn-prime" onclick="handleRegister()">Register</button>
        </div>
    </div>
</div>

<div id="dashboard-section" class="dashboard-wrapper">
    <div class="system-header d-flex justify-content-between align-items-center">
        <h5 class="fw-bold mb-0 text-primary">Backend-System <span class="text-muted fw-light">|Task Manager</span></h5>
        
        <div class="d-flex align-items-center gap-3">
            <div class="user-pill">
                <i class="bi bi-person-circle me-1"></i> <span id="display-name">GUEST</span>
            </div>
            <button class="btn btn-sm btn-link text-danger text-decoration-none fw-bold" onclick="handleLogout()">
                <i class="bi bi-box-arrow-right me-1"></i> LOGOUT
            </button>
        </div>
    </div>

    <div class="flex-container">
        <div class="left-panel">
            <div class="card-custom">
                <h6 class="fw-bold mb-3 text-uppercase small text-muted">Add Task,Notes,Products</h6>
                <input type="text" id="task-title" class="form-control wide-input mb-3" placeholder="Subject Title...">
                <textarea id="task-desc" class="form-control wide-input long-textarea mb-3" placeholder="Detailed content logs..."></textarea>
                <button class="btn btn-primary w-100 fw-bold" onclick="handleCreateTask()">Add </button>
            </div>
        </div>

        <div class="right-panel">
            <div class="card-custom">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h6 class="fw-bold mb-0 text-uppercase small text-muted">Records</h6>
                    <span id="task-count" class="badge bg-primary">0</span>
                </div>
                <hr>
                <ul id="task-list" class="list-group list-group-flush" style="max-height: 65vh; overflow-y: auto;">
                    </ul>
            </div>
        </div>
    </div>
</div>

<script>
   
    function togglePassword(id) {
        const input = document.getElementById(id);
        const icon = input.nextElementSibling;
        const isPass = input.type === "password";
        input.type = isPass ? "text" : "password";
        icon.classList.replace(isPass ? "bi-eye" : "bi-eye-slash", isPass ? "bi-eye-slash" : "bi-eye");
    }

    function showAuth(type) {
        const isLogin = type === 'login';
        document.getElementById('form-login').style.display = isLogin ? 'block' : 'none';
        document.getElementById('form-register').style.display = isLogin ? 'none' : 'block';
        document.getElementById('tab-login').classList.toggle('active', isLogin);
        document.getElementById('tab-register').classList.toggle('active', !isLogin);
    }

    function notify(msg, type) {
        const toast = document.getElementById('message-toast');
        toast.className = `alert shadow-lg alert-${type === 'error' ? 'danger' : 'success'}`;
        toast.innerText = msg;
        toast.style.display = 'block';
        setTimeout(() => toast.style.display = 'none', 3000);
    }

    function updateView() {
        const token = localStorage.getItem('access_token');
        const user = localStorage.getItem('logged_user');
        const role = localStorage.getItem('user_role'); // Get the saved role
        
        document.getElementById('auth-section').style.display = token ? 'none' : 'block';
        document.getElementById('dashboard-section').style.display = token ? 'block' : 'none';
        
        if (token) {
            
            const roleText = role ? ` [${role.toUpperCase()}]` : "";
            document.getElementById('display-name').innerText = `${user.toUpperCase()}${roleText}`;
            fetchTasks();
        }
    }

    
    async function handleLogin() {
        const u = document.getElementById('username').value;
        const p = document.getElementById('password').value;
        if(!u || !p) return notify("Please input all credentials.", "error");

        const res = await fetch('/api/v1/accounts/login/', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username: u, password: p })
        });
        
        const data = await res.json();
        
        if (res.ok) {
            localStorage.setItem('access_token', data.access);
            localStorage.setItem('logged_user', data.username || u);
            localStorage.setItem('user_role', data.role); // This enables the Admin View
            
            notify("Access Granted: " + (data.role || 'User'), "success");
            updateView();
        } else { 
            notify(data.error || "Access Denied: Invalid credentials.", "error"); 
        }
    }

    async function handleRegister() {
        const u = document.getElementById('reg-username').value;
        const p = document.getElementById('reg-password').value;
        const r = document.getElementById('reg-role').value;
        if(!u || !p) return notify("Full details required.", "error");

        const res = await fetch('/api/v1/accounts/register/', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username: u, password: p, role: r })
        });
        const data = await res.json();
        if (res.ok) { 
            notify("Identity Created. Please Sign In.", "success"); 
            showAuth('login'); 
        } else { 
            const errorMsg = data.password ? data.password[0] : (data.username ? data.username[0] : "Registry Conflict.");
            notify(errorMsg, "error"); 
        }
    }

    async function fetchTasks() {
    const token = localStorage.getItem('access_token');
    if (!token) return;

    try {
        const res = await fetch('/api/v1/tasks/', {
            headers: { 'Authorization': 'Bearer ' + token }
        });

        if (res.ok) {
            const tasks = await res.json();
            document.getElementById('task-count').innerText = tasks.length;
            
            const listElem = document.getElementById('task-list');
            if(!listElem) return;

            listElem.innerHTML = tasks.map(t => {
                const displayName = t.owner_name || 'User'; 
                
                return `
                <li class="list-group-item px-0 border-0 mb-3">
                    <div class="card-custom border p-3 shadow-sm" style="border-radius: 8px;">
                        <div class="d-flex justify-content-between align-items-start">
                            <div style="max-width: 85%;">
                                <span class="badge bg-light text-primary border mb-2" style="font-size: 0.7rem;">
                                    <i class="bi bi-person-circle"></i> ${t.owner_name || 'System User'}
                                </span>
                                
                                <div class="fw-bold text-dark" style="font-size: 0.95rem;">${t.title}</div>
                                <div class="text-muted mt-1" style="font-size: 0.8rem;">${t.description}</div>
                            </div>
                            <i class="bi bi-trash text-danger" style="cursor:pointer; font-size: 1.1rem;" onclick="deleteTask(${t.id})"></i>
                        </div>
                    </div>
                </li>`}).join('');
        }
    } catch (err) {
        console.error("Failed to load tasks:", err);
    }
}

    async function handleCreateTask() {
    const title = document.getElementById('task-title').value;
    const description = document.getElementById('task-desc').value;
    const token = localStorage.getItem('access_token');

    if (!title) {
        alert("Title is required!");
        return;
    }

    const res = await fetch('/api/v1/tasks/', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + token 
        },
        body: JSON.stringify({ title, description })
    });

    if (res.ok) {
        document.getElementById('task-title').value = '';
        document.getElementById('task-desc').value = '';
        fetchTasks(); 
    } else {
        const error = await res.json();
        console.error("Error adding task:", error);
        alert("Admin Task Creation Failed. Check console.");
    }
    }
    

    async function deleteTask(id) {
        if(!confirm("Are you sure you want to delete this record?")) return;
        
        const token = localStorage.getItem('access_token');
        const res = await fetch(`/api/v1/tasks/${id}/`, {
            method: 'DELETE',
            headers: { 'Authorization': 'Bearer ' + token }
        });
        
        if (res.ok) {
            fetchTasks();
            notify("Record deleted.", "success");
        } else {
            notify("Permission Denied: Unauthorized.", "error");
        }
    }

    function handleLogout() {
        localStorage.clear();
        updateView();
        notify("Session Closed.", "success");
    }

    window.onload = updateView;
</script>
</body>
</html>
